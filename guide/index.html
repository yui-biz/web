<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ご案内 | yui</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preconnect" href="https://res.cloudinary.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400&family=Noto+Sans+JP:wght@300;400&display=swap" rel="stylesheet">
<style>
:root{--bg:#faf9f7;--surface:#fff;--text:#1a1a1a;--text-light:#555;--text-muted:#999;--accent:#8c7851;--accent-light:#c4b394;--accent-bg:rgba(140,120,81,.06);--border:#ddd8d0;--border-light:#eceae5;--serif:"Noto Serif JP","Hiragino Mincho ProN","Yu Mincho",serif;--sans:"Noto Sans JP","Hiragino Kaku Gothic ProN",sans-serif}
*{margin:0;padding:0;box-sizing:border-box}html{scroll-behavior:smooth}
body{font-family:var(--sans);font-weight:300;background:var(--bg);color:var(--text);line-height:1.9;font-size:13.5px;-webkit-text-size-adjust:100%;-webkit-font-smoothing:antialiased}

/* ===== Loading ===== */
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100svh;gap:20px;background:var(--bg)}
.loading-logo{font-family:var(--serif);font-size:.75rem;letter-spacing:.6em;color:var(--accent);font-weight:300;text-indent:.6em}
.loading-spinner{position:relative;width:36px;height:36px}
.loading-spinner::before,.loading-spinner::after{content:"";position:absolute;inset:0;border-radius:50%;border:1px solid transparent}
.loading-spinner::before{border-top-color:var(--accent-light);border-right-color:var(--accent-light);animation:spin 1.2s cubic-bezier(.4,0,.2,1) infinite}
.loading-spinner::after{inset:6px;border-top-color:var(--accent);animation:spin 1.8s cubic-bezier(.4,0,.2,1) reverse infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ===== Hero ===== */
.hero{position:relative;text-align:center;overflow:hidden;padding:0;height:220px;background:#1a1a1a;max-width:560px;margin:0 auto}
.hero-slide{will-change:opacity}
.hero-slider{position:absolute;inset:0}
.hero-slide{position:absolute;inset:0;background-size:cover;background-position:center;opacity:0;transition:opacity 2s ease-in-out}
.hero-slide.active{opacity:1}
.hero-overlay{position:absolute;inset:0;background:rgba(20,20,20,.45);z-index:1}
.hero-content{position:absolute;bottom:0;left:0;right:0;z-index:2;padding:0 1.5rem 2.5rem;background:linear-gradient(transparent,rgba(20,20,20,.6))}
.hero-logo{margin-bottom:10px;display:flex;align-items:center;justify-content:center;gap:12px}
.hero-logo img{height:44px;width:auto;filter:brightness(0) invert(1);opacity:.9;position:relative;z-index:2}
.hero-mizuhiki{flex:1;height:2px;position:relative;overflow:hidden}
.hero-mizuhiki::before,.hero-mizuhiki::after{content:"";position:absolute;top:0;height:1px;background:rgba(255,255,255,.45);border-radius:1px}
.hero-mizuhiki--left::before{right:0;width:0;animation:mizuhikiLeft 2s cubic-bezier(.25,.1,.25,1) 1.2s forwards}
.hero-mizuhiki--left::after{right:0;top:3px;width:0;animation:mizuhikiLeft 2.2s cubic-bezier(.25,.1,.25,1) 1.4s forwards;background:rgba(255,255,255,.25)}
.hero-mizuhiki--right::before{left:0;width:0;animation:mizuhikiRight 2s cubic-bezier(.25,.1,.25,1) 1.2s forwards}
.hero-mizuhiki--right::after{left:0;top:3px;width:0;animation:mizuhikiRight 2.2s cubic-bezier(.25,.1,.25,1) 1.4s forwards;background:rgba(255,255,255,.25)}
@keyframes mizuhikiLeft{from{width:0}to{width:100%}}
@keyframes mizuhikiRight{from{width:0}to{width:100%}}
.hero-catch{font-family:var(--serif);font-size:1.05rem;font-weight:300;letter-spacing:.12em;line-height:1.9;color:rgba(255,255,255,.92)}
.hero-catch em{font-style:normal;color:#f01e00}

/* ===== Tab hero image ===== */
.tab-hero{width:100%;max-width:560px;height:140px;background-size:cover;background-position:center;position:relative;margin:0 auto;display:block}
.tab-hero::after{content:"";position:absolute;bottom:0;left:0;right:0;height:40px;background:linear-gradient(transparent,var(--bg))}

/* ===== Tab bar ===== */
.tab-bar{display:flex;overflow-x:auto;-webkit-overflow-scrolling:touch;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:10;gap:0;padding:0;max-width:560px;margin:0 auto}
.tab-bar::-webkit-scrollbar{display:none}
.tab-btn{flex-shrink:0;padding:11px 14px;border:none;background:none;font-family:var(--serif);font-size:.72rem;font-weight:400;color:var(--text-muted);cursor:pointer;border-bottom:2px solid transparent;letter-spacing:.06em;white-space:nowrap;transition:all .2s}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:500}
.tab-btn:hover{color:var(--text-light)}

/* ===== Container ===== */
.container{max-width:540px;margin:0 auto;padding:0 1.5rem}

/* ===== TOC ===== */
.toc{padding:2rem 0 1rem}
.toc-label{font-family:var(--serif);font-size:.6rem;letter-spacing:.4em;color:var(--accent-light);text-align:center;margin-bottom:1.2rem;text-indent:.4em;text-transform:uppercase}
.toc ol{list-style:none;counter-reset:toc}
.toc li{counter-increment:toc}
.toc li+li{border-top:1px solid var(--border-light)}
.toc a{display:flex;align-items:center;padding:.85rem 0;text-decoration:none;color:var(--text);font-family:var(--serif);font-size:.8rem;font-weight:300;letter-spacing:.08em;transition:color .3s}
.toc a:hover{color:var(--accent)}
.toc a::before{content:"0" counter(toc);font-family:var(--serif);font-size:.65rem;color:var(--accent-light);letter-spacing:.15em;min-width:2.5rem;font-weight:300}
.toc a::after{content:"";flex:1}

/* ===== Section ===== */
.sep{width:100%;height:1px;background:linear-gradient(90deg,transparent,var(--border-light) 20%,var(--border-light) 80%,transparent)}
.section{padding:2rem 0 1.5rem}
.section-number{font-family:var(--serif);font-size:.6rem;letter-spacing:.4em;color:var(--accent-light);margin-bottom:.6rem;text-indent:.4em}
.section h2{font-family:var(--serif);font-size:1rem;font-weight:300;letter-spacing:.15em;line-height:2;margin-bottom:.8rem;color:var(--text)}
.ume-heading{display:flex;align-items:center;gap:.5em;font-family:var(--serif);font-size:.88rem;font-weight:400;letter-spacing:.1em;margin:1.2rem 0 .5rem;color:var(--text)}

.section-line{width:24px;height:1px;background:var(--accent-light);margin-bottom:1rem}
.section .body{font-size:.82rem;line-height:2;font-weight:300;color:var(--text-light)}
.section .body p{margin-bottom:.7rem}
.section .body p:last-child{margin-bottom:0}

/* ===== Typography ===== */
.callout{border-left:2px solid var(--accent-light);padding:.7rem 0 .7rem 1.2rem;margin:1rem 0;font-size:.8rem;line-height:1.9;color:var(--text-light);background:var(--accent-bg);border-radius:0 4px 4px 0}
.message{margin:1rem 0;padding:1rem 1.2rem;background:var(--surface);border:1px solid var(--border-light);border-radius:6px;font-family:var(--serif);font-size:.78rem;line-height:1.6;color:var(--text-light);letter-spacing:.04em;text-align:center}
.message p{margin-bottom:.2rem}
.body ul{list-style:none;padding:0;margin-bottom:.8rem}
.body li{padding-left:1.2em;position:relative;font-size:.82rem;line-height:2;margin-bottom:.15rem;color:var(--text-light)}
.body li::before{content:"";position:absolute;left:0;top:.85em;width:4px;height:4px;border-radius:50%;background:var(--accent-light)}
.note{font-size:.75rem;color:var(--text-muted);line-height:1.9}
a{color:var(--accent);word-break:break-all;text-decoration:none}
a:hover{text-decoration:underline}

/* ===== Products ===== */
.product-list{margin:.8rem 0}
.product-item{padding:.7rem 0;border-bottom:1px solid var(--border-light)}
.product-item:last-child{border-bottom:none}
.product-header{display:flex;flex-wrap:wrap;align-items:baseline;gap:3px 8px;margin-bottom:4px}
.product-name{font-family:var(--serif);font-size:.82rem;font-weight:400;letter-spacing:.05em}
.product-price{font-size:.75rem;color:var(--text-muted);font-weight:300}
.product-cat{font-size:.65rem;color:var(--accent);background:var(--accent-bg);border:1px solid var(--border);padding:1px 8px;border-radius:10px;vertical-align:middle;font-weight:400}
.product-links{display:flex;flex-wrap:wrap;gap:6px;margin-top:4px}
.product-links a{display:inline-block;padding:3px 10px;border:1px solid var(--border);border-radius:12px;font-size:.68rem;color:var(--text-light);text-decoration:none;transition:all .2s;letter-spacing:.02em}
.product-links a::after{content:" ↗";font-size:.6rem;opacity:.5}
.product-links a:hover{background:var(--accent);color:#fff;border-color:var(--accent);text-decoration:none}
.product-links a:hover::after{opacity:1}

/* ===== Tab panel ===== */
.tab-panel{animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}

/* ===== Scroll animation ===== */
.section .section-number{opacity:0;transform:translateY(15px);transition:opacity 1.2s cubic-bezier(.25,.1,.25,1) .1s,transform 1.2s cubic-bezier(.25,.1,.25,1) .1s}
.section.visible .section-number{opacity:1;transform:translateY(0)}
.section h2{opacity:0;transform:translateY(20px);transition:opacity 1.4s cubic-bezier(.25,.1,.25,1) .2s,transform 1.4s cubic-bezier(.25,.1,.25,1) .2s}
.section.visible h2{opacity:1;transform:translateY(0)}
.section-line{opacity:0;width:0;transition:opacity 1s cubic-bezier(.25,.1,.25,1) .5s,width 1.2s cubic-bezier(.25,.1,.25,1) .5s}
.section.visible .section-line{opacity:1;width:24px}
.section .body{opacity:0;transform:translateY(15px);transition:opacity 1.2s cubic-bezier(.25,.1,.25,1) .4s,transform 1.2s cubic-bezier(.25,.1,.25,1) .4s}
.section.visible .body{opacity:1;transform:translateY(0)}
.product-item{opacity:0;transform:translateY(12px)}
.product-item.visible{opacity:1;transform:translateY(0)}
.toc li{opacity:0;transform:translateY(8px)}
.toc li.visible{opacity:1;transform:translateY(0)}

/* ===== Hero entrance ===== */
.hero-logo{animation:heroSlideUp 2s cubic-bezier(.25,.1,.25,1) .5s both}
.hero-catch{animation:heroSlideUp 2s cubic-bezier(.25,.1,.25,1) .8s both}
@keyframes heroSlideUp{from{opacity:0;transform:translateY(15px)}to{opacity:1;transform:translateY(0)}}

/* ===== Responsive ===== */
@media(min-width:768px){
  .hero-content{padding:0 2rem 2.5rem}
  .hero-catch{font-size:1.3rem}
  .hero-logo img{height:52px}
  .section{padding:2.5rem 0 2rem}
  .tab-btn{font-size:.75rem;padding:14px 16px}
  .tab-hero{height:160px}
}
</style>
</head>
<body>
<div id="app"><div class="loading"><div class="loading-spinner"></div><p class="loading-logo">yui</p></div></div>
<script>
var GAS_API = 'https://script.google.com/macros/s/AKfycbzk2XDHbIPIh8yPGX5vvt3vHC8cPL1Kle7cIAC-sWsd591nwRo5IZNFCqcV_o0Ig6Os/exec';
var CACHE_TTL = 24 * 60 * 60 * 1000; // 24時間

(function() {
  var params = new URLSearchParams(location.search);
  var customerId = params.get('id') || '';
  var cacheKey = 'guide_' + (customerId || '_default');

  // キャッシュがあれば即時表示し、バックグラウンドで更新
  try {
    var cached = localStorage.getItem(cacheKey);
    if (cached) {
      var obj = JSON.parse(cached);
      if (Date.now() - obj.ts < CACHE_TTL) {
        render(obj.data);
        // バックグラウンドで新鮮なデータを取得してキャッシュ更新（表示は変えない）
        fetchFromGas(customerId, cacheKey, false);
        return;
      }
    }
  } catch(e) {}

  // キャッシュなし→ローディング表示のままGASから取得
  fetchFromGas(customerId, cacheKey, true);
})();

function fetchFromGas(customerId, cacheKey, showResult) {
  var url = GAS_API + '?action=guideData' + (customerId ? '&customer=' + encodeURIComponent(customerId) : '');
  fetch(url)
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (data.error) { if (showResult) showError(data.error); return; }
      try { localStorage.setItem(cacheKey, JSON.stringify({ ts: Date.now(), data: data })); } catch(e) {}
      if (showResult) render(data);
    })
    .catch(function(e) { if (showResult) showError(e.message); });
}

function showError(msg) {
  document.getElementById('app').innerHTML =
    '<p style="padding:60px;text-align:center;font-family:sans-serif;color:#999;">ページの読み込みに失敗しました</p>';
}

function render(data) {
  var pages = data.pages;
  var heroSlides = data.heroSlides;

  // Hero slides
  var slidesHtml = heroSlides.map(function(url, i) {
    return '<div class="hero-slide"' + (i === 0 ? ' style="background-image:url(' + url + ');"' : ' data-bg="' + url + '"') + '></div>';
  }).join('');

  // Tab bar
  var tabLabels = pages.map(function(p, i) {
    var short = p.title.replace(/（.*）/, '').replace(/について$/, '').replace(/デジタルカタログ/, '');
    return '<button class="tab-btn' + (i === 0 ? ' active' : '') + '" onclick="switchTab(' + i + ')">' + short + '</button>';
  }).join('');

  // Tab panels
  var secIdx = 0;
  var tabPanels = pages.map(function(p, pi) {
    var localIdx = 0;
    var tocItems = p.sections.map(function(s, si) {
      var id = 's' + (secIdx + si);
      return '<li><a href="#' + id + '" onclick="scrollToSec(event,\'' + id + '\')">' + s.name + '</a></li>';
    }).join('');
    var sections = p.sections.map(function(s) {
      var id = 's' + secIdx++;
      localIdx++;
      var num = ('0' + localIdx).slice(-2);
      return '<div class="sep"></div><section class="section" id="' + id + '">'
        + '<p class="section-number">' + num + '</p>'
        + '<h2>' + s.name + '</h2>'
        + '<div class="section-line"></div>'
        + '<div class="body">' + s.html + '</div>'
        + '</section>';
    }).join('');
    var imgHtml = p.tabImg ? '<div class="tab-hero" style="background-image:url(' + p.tabImg + ');"></div>' : '';
    return '<div class="tab-panel" id="tab-' + pi + '"' + (pi !== 0 ? ' style="display:none;"' : '') + '>'
      + imgHtml
      + '<div class="container"><nav class="toc"><p class="toc-label">CONTENTS</p><ol>' + tocItems + '</ol></nav>'
      + sections + '</div></div>';
  }).join('');

  var html = '<header class="hero" id="top">'
    + '<div class="hero-slider">' + slidesHtml + '</div>'
    + '<div class="hero-overlay"></div>'
    + '<div class="hero-content">'
    + '<div class="hero-logo"><span class="hero-mizuhiki hero-mizuhiki--left"></span>'
    + '<img src="https://res.cloudinary.com/yui-gift/image/upload/h_88,f_auto,q_auto/v1775458897/logo_B_r9hqn5.png" alt="yui">'
    + '<span class="hero-mizuhiki hero-mizuhiki--right"></span></div>'
    + '<p class="hero-catch">一生に一度のこだわりを、<em>一枚</em>で。</p>'
    + '</div></header>'
    + '<div class="tab-bar">' + tabLabels + '</div>'
    + tabPanels;

  document.getElementById('app').innerHTML = html;
  initHeroSlider();
  setTimeout(initScrollAnim, 100);
}

function switchTab(i) {
  var panels = document.querySelectorAll('.tab-panel');
  for (var j = 0; j < panels.length; j++) panels[j].style.display = 'none';
  var el = document.getElementById('tab-' + i);
  if (el) el.style.display = 'block';
  var btns = document.querySelectorAll('.tab-btn');
  for (var j = 0; j < btns.length; j++) btns[j].className = 'tab-btn' + (j === i ? ' active' : '');
  window.scrollTo(0, 0);
  var panel = document.getElementById('tab-' + i);
  if (panel) {
    panel.querySelectorAll('.section, .toc li, .product-item').forEach(function(el) {
      el.classList.remove('visible');
      el.style.transition = '';
    });
    setTimeout(initScrollAnim, 80);
  }
}

function scrollToSec(e, id) {
  e.preventDefault();
  var el = document.getElementById(id);
  if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function initHeroSlider() {
  var slides = document.querySelectorAll('.hero-slide');
  if (!slides.length) return;
  var current = 0;
  slides[0].classList.add('active');
  setTimeout(function() {
    for (var i = 1; i < slides.length; i++) {
      var bg = slides[i].getAttribute('data-bg');
      if (bg) { slides[i].style.backgroundImage = 'url(' + bg + ')'; slides[i].removeAttribute('data-bg'); }
    }
  }, 1000);
  setInterval(function() {
    slides[current].classList.remove('active');
    current = (current + 1) % slides.length;
    slides[current].classList.add('active');
  }, 3000);
}

function initScrollAnim() {
  var secObserver = new IntersectionObserver(function(entries) {
    entries.forEach(function(entry) { if (entry.isIntersecting) entry.target.classList.add('visible'); });
  }, { threshold: 0.05, rootMargin: '0px 0px -60px 0px' });
  document.querySelectorAll('.section').forEach(function(el) { secObserver.observe(el); });

  var prodObserver = new IntersectionObserver(function(entries) {
    entries.forEach(function(entry) {
      if (entry.isIntersecting) {
        var items = entry.target.parentElement.querySelectorAll('.product-item');
        items.forEach(function(item, i) {
          item.style.transition = 'opacity 1s cubic-bezier(.25,.1,.25,1) ' + (i * 0.08) + 's, transform 1s cubic-bezier(.25,.1,.25,1) ' + (i * 0.08) + 's';
          item.classList.add('visible');
        });
        prodObserver.unobserve(entry.target);
      }
    });
  }, { threshold: 0.1 });
  document.querySelectorAll('.product-list').forEach(function(el) { prodObserver.observe(el); });

  var tocObserver = new IntersectionObserver(function(entries) {
    entries.forEach(function(entry) {
      if (entry.isIntersecting) {
        var items = entry.target.querySelectorAll('li');
        items.forEach(function(item, i) {
          item.style.transition = 'opacity .8s cubic-bezier(.25,.1,.25,1) ' + (i * 0.1) + 's, transform .8s cubic-bezier(.25,.1,.25,1) ' + (i * 0.1) + 's';
          item.classList.add('visible');
        });
        tocObserver.unobserve(entry.target);
      }
    });
  }, { threshold: 0.1 });
  document.querySelectorAll('.toc ol').forEach(function(el) { tocObserver.observe(el); });
}
</script>
</body>
</html>
